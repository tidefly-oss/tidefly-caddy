name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tidefly-oss/tidefly-caddy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Caddy version from builder
        id: caddy_version
        run: |
          VERSION=$(docker run --rm caddy:2 caddy version | cut -d' ' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        run: |
          CADDY_VER="${{ steps.caddy_version.outputs.version }}"
          INPUT_VER="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VER" ]; then
            TAG="$INPUT_VER"
          else
            SHA="${{ github.sha }}"
            TAG="${CADDY_VER}-tidefly.${SHA:0:7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "caddy_version=$CADDY_VER" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## tidefly-caddy ${{ steps.tag.outputs.tag }}

            Built on Caddy ${{ steps.tag.outputs.caddy_version }}

            ### Included Plugins
            - [caddy-l4](https://github.com/mholt/caddy-l4) — Layer 4 TCP/UDP proxy
            - [caddy-ratelimit](https://github.com/mholt/caddy-ratelimit) — Rate limiting

            ### Image
            ```
            ghcr.io/tidefly-oss/tidefly-caddy:latest
            ghcr.io/tidefly-oss/tidefly-caddy:${{ steps.tag.outputs.tag }}
            ```
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}